<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Booking - Top Destinations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(45deg, #1E88E5, #1565C0);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .booking-form {
            padding: 40px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .form-group {
            flex: 1;
            min-width: 250px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #1E88E5;
        }
        .search-btn {
            background: linear-gradient(45deg, #1E88E5, #1565C0);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
            display: block;
            margin: 30px auto;
        }
        .search-btn:hover {
            transform: translateY(-2px);
        }
        .train-routes {
            padding: 40px;
            background: #f8f9fa;
        }
        .train-routes h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .route-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .route-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .route-card:hover {
            transform: translateY(-5px);
        }
        .route-card h3 {
            color: #1E88E5;
            margin-bottom: 10px;
        }
        .route-card .price {
            font-size: 24px;
            color: #4CAF50;
            font-weight: bold;
            margin-top: 10px;
        }
        .train-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa fa-train"></i> Train Booking</h1>
            <p>Book Indian Railway tickets online</p>
        </div>

        <div class="booking-form">
            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label for="from">From</label>
                        <input type="text" id="from" placeholder="Source station" required>
                    </div>
                    <div class="form-group">
                        <label for="to">To</label>
                        <input type="text" id="to" placeholder="Destination station" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="departure">Departure Date</label>
                        <input type="date" id="departure" required>
                    </div>
                    <div class="form-group">
                        <label for="class">Class</label>
                        <select id="class">
                            <option value="all">All Classes</option>
                            <option value="1a">1st AC</option>
                            <option value="2a">2nd AC</option>
                            <option value="3a">3rd AC</option>
                            <option value="sl">Sleeper</option>
                            <option value="cc">Chair Car</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="quota">Quota</label>
                        <select id="quota">
                            <option value="general">General</option>
                            <option value="tatkal">Tatkal</option>
                            <option value="ladies">Ladies</option>
                            <option value="senior">Senior Citizen</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="passengers">Passengers</label>
                        <select id="passengers">
                            <option value="1">1 Passenger</option>
                            <option value="2">2 Passengers</option>
                            <option value="3">3 Passengers</option>
                            <option value="4">4 Passengers</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="search-btn">
                    <i class="fa fa-search"></i> Search Trains
                </button>
            </form>
        </div>

        <div class="train-routes">
            <h2>Popular Routes</h2>
            <div class="route-grid">
                <div class="route-card">
                    <h3><i class="fa fa-train"></i> Delhi → Mumbai</h3>
                    <p>Rajdhani Express</p>
                    <div class="train-info">
                        <span>Duration: 16h</span>
                        <span>Daily</span>
                    </div>
                    <div class="price">₹2,450</div>
                </div>
                <div class="route-card">
                    <h3><i class="fa fa-train"></i> Mumbai → Bangalore</h3>
                    <p>Udyan Express</p>
                    <div class="train-info">
                        <span>Duration: 24h</span>
                        <span>Daily</span>
                    </div>
                    <div class="price">₹1,850</div>
                </div>
                <div class="route-card">
                    <h3><i class="fa fa-train"></i> Delhi → Kolkata</h3>
                    <p>Howrah Rajdhani</p>
                    <div class="train-info">
                        <span>Duration: 19h</span>
                        <span>Daily</span>
                    </div>
                    <div class="price">₹2,850</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
