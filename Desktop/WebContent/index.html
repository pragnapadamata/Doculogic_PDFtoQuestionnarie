<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Destination Places</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }
    #video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #fff;
    }
    .chat-container {
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      overflow: hidden;
      background-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }
    .message {
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      text-align: left;
      background-color: rgba(255, 255, 255, 0.3);
    }
    .message:last-child {
      border-bottom: none;
    }
    .message.sent {
      background-color: rgba(0, 255, 0, 0.3);
    }
    .message.received {
      background-color: rgba(255, 0, 0, 0.3);
    }
    input[type="text"],
    input[type="password"] {
      width: calc(100% - 20px);
      padding: 10px;
      border: none;
      border-radius: 5px;
      margin: 10px;
    }
    input[type="submit"],
    input[type="reset"] {
      padding: 10px 20px;
      background-color: orange;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin: 10px;
    }
    input[type="submit"]:hover,
    input[type="reset"]:hover {
      background-color: #ff7f00;
    }
    .signup-link {
      color: #fff;
      text-decoration: underline;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<video autoplay loop muted id="video-background">
  <source src="https://videos.pexels.com/video-files/3015510/3015510-sd_640_360_24fps.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="content">
  <marquee>
    <h1>Discover the World's Hidden Treasures and Create Unforgettable Memories</h1>
  </marquee>

  <div class="chat-container" id="signup-container">
    <div class="message received">Welcome to Top Destinations!</div>

<form action="login.jsp" method="POST" id="login-form">
    <div class="message sent">Enter your username:</div>
    <input type="text" id="username" name="username">

    <div class="message sent">Enter your password:</div>
    <input type="password" id="password" name="password">

    <input type="submit" value="Login">
    <input type="reset" value="Reset">

    <div class="message received">Don't have an account? 
        <span class="signup-link" id="signup-link">Sign up here</span>
    </div>
</form>

<form action="signup.jsp" method="POST" id="signup-form" class="hidden">
    <div class="message received" id="signup-message">Sign up for Top Destinations:</div>
    <div class="message sent">Choose a username:</div>
    <input type="text" id="signup-username" name="signup-username">

    <div class="message sent">Choose a password:</div>
    <input type="password" id="signup-password" name="signup-password">

    <div class="message sent">Confirm password:</div>
    <input type="password" id="confirm-password" name="confirm-password">

    <input type="submit" value="Signup">
    <input type="reset" value="Reset">
</form>
  </div>
</div>

<script>
  // JavaScript to toggle between login and signup forms
  document.getElementById('signup-link').addEventListener('click', function() {
    var loginForm = document.getElementById('login-form');
    var signupForm = document.getElementById('signup-form');
    
    // Hide login form
    loginForm.classList.add('hidden');
    
    // Show signup form
    signupForm.classList.remove('hidden');
  });

  // JavaScript to redirect to login form after successful signup
  document.getElementById('signup-form').addEventListener('submit', function(event) {
    // Prevent default form submission
    event.preventDefault();

    // Here you can add code to handle form submission (e.g., send data to server)

    // After successful signup (for demo purposes, assuming success after submission)
    // Redirect to login form
    var loginForm = document.getElementById('login-form');
    var signupForm = document.getElementById('signup-form');
    
    // Show login form
    loginForm.classList.remove('hidden');
    
    // Hide signup form
    signupForm.classList.add('hidden');
  });
</script>

</body>
</html>
